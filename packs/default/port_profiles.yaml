profiles:
  access-user:
    description: "Standard user access port"
    requires_vlan: true
    template_hint: interfaces_access

  access-ap:
    description: "Wireless access point port (access mode)"
    requires_vlan: true
    template_hint: interfaces_access

  access-ap-trunk:
    description: "Wireless access point port (trunk mode — native VLAN is the AP VLAN)"
    requires_vlan: false
    requires_native_vlan: true
    template_hint: interfaces_ap_trunk

  access-voip:
    description: "VoIP phone port (data + voice VLAN)"
    requires_vlan: true
    requires_voice_vlan: true
    template_hint: interfaces_access

  trunk-uplink:
    description: "Trunk uplink to distribution or core"
    requires_vlan: false
    template_hint: interfaces_trunk

  unused:
    description: "Unused / disabled port"
    requires_vlan: false
    template_hint: interfaces_unused
